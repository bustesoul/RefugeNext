name: CI Build

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_path: build/windows/x64/runner/refuge-windows.zip
            asset_name: refuge-windows.zip
          - os: macos-latest
            output_path: build/ios/ipa/refuge-ios-unsigned.ipa
            asset_name: refuge-ios-unsigned.ipa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        if: matrix.os == 'macos-latest'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release
          powershell Compress-Archive build/windows/x64/runner/Release build/windows/x64/runner/refuge-windows.zip


      - name: Build iOS (Unsigned IPA)
        if: matrix.os == 'macos-latest'
        run: |
          flutter build ipa --release --no-codesign

          # Flutter may skip IPA export when code signing is disabled.
          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            mv build/ios/ipa/*.ipa build/ios/ipa/refuge-ios-unsigned.ipa
          else
            mkdir -p build/ios/ipa/Payload
            cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
            (
              cd build/ios/ipa
              zip -qry refuge-ios-unsigned.ipa Payload
            )
            rm -rf build/ios/ipa/Payload
          fi

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.output_path }}
